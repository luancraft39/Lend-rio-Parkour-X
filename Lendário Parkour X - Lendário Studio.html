<!DOCTYPE html>
<!-- saved from url=(0043)https://www.lncc.br/~borges/php/testar.html -->
<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lendário Parkour X - Lendário Studio</title>
    <!-- Adicionando Font Awesome para ícones reais -->
    <link rel="stylesheet" href="./Lendário Parkour X - Lendário Studio_files/all.min.css">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #b8d98d; user-select: none; touch-action: none; }
        canvas { display: block; }

        /* TELA DE ROTAÇÃO */
        #rotate-screen {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #2980b9; color: white;
            z-index: 1000; text-align: center;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .rotate-icon { font-size: 80px; animation: rotating 2s infinite; margin-bottom: 20px; }
        @keyframes rotating { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        @media (orientation: portrait) { #rotate-screen { display: flex; } }

        #ui-layer {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; z-index: 50;
        }

        .menu-box {
            background: rgba(45, 79, 26, 0.85); padding: 40px; border-radius: 30px;
            backdrop-filter: blur(8px); border: 4px solid #f1c40f; text-align: center;
            color: white; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 80%;
        }

        .game-title {
            font-size: 50px; color: #f1c40f; font-weight: 900; margin-bottom: 30px;
            text-shadow: 4px 4px 0px #000; animation: glow 1.5s infinite alternate ease-in-out;
        }

        @keyframes glow {
            from { transform: scale(1); text-shadow: 0 0 10px #f1c40f, 4px 4px 0px #000; }
            to { transform: scale(1.05); text-shadow: 0 0 30px #fff, 4px 4px 0px #000; }
        }

        .btn {
            background: #e67e22; color: white; border: none; padding: 18px 50px;
            font-size: 20px; margin: 10px; cursor: pointer; border-radius: 50px;
            font-weight: bold; box-shadow: 0 6px #a3520e; transition: 0.1s;
            min-width: 220px; text-transform: uppercase;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #a3520e; }

        #hud { position: absolute; bottom: 0; width: 100%; height: 220px; pointer-events: none; z-index: 60; display: none; }
        #joystick-area { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; border: 3px solid #fff; touch-action: none; }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; pointer-events: none; }
        #jump-button { position: absolute; bottom: 50px; right: 50px; width: 110px; height: 110px; background: rgba(255,255,255,0.3); border: 4px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; font-size: 20px; touch-action: none; }
        
        #stats { position: absolute; top: 20px; left: 20px; font-size: 24px; z-index: 30; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; color: white; display: flex; flex-direction: column; gap: 8px;}
        
        /* Estilização dos ícones Reais */
        .real-heart { color: #ff4757; text-shadow: 0 2px 5px rgba(255, 71, 87, 0.5); margin-right: 3px; }
        .real-star { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.7); margin-right: 5px; }
        
        #star-counter { font-size: 20px; color: #f1c40f; font-weight: bold; display: flex; align-items: center; }
    </style>
</head>
<body onclick="startMusic()">

    <audio id="game-music" loop="">
        <source src="https://litter.catbox.moe/arii51.mp3" type="audio/mpeg">
    </audio>

    <div id="rotate-screen">
        <div class="rotate-icon">&#128241;&#128260;</div>
        <h2>VIRE A TELA</h2>
        <p>Gire para o modo deitado para jogar!</p>
    </div>

    <div id="ui-layer">
        <div id="main-menu" class="menu-box" style="display: flex;">
            <h1 class="game-title">LENDÁRIO PARKOUR X</h1>
            <button class="btn" onclick="openCharSelect()">JOGAR</button><br>
            <button class="btn" style="background:#3498db;" onclick="showInfo()">INFORMAÇÕES</button>
        </div>

        <div id="info-menu" class="menu-box" style="display: none; text-align: left;">
            <h2>INFORMAÇÕES</h2>
            <p><b>Criador:</b> Lendário Studio</p>
            <p><b>Modo de Jogo:</b> Parkour / Infantil</p>
            <p><b>Criação:</b> 14/04/2026</p>
            <p><b>Lançamento:</b> 01/05/2026</p>
            <p><b>Direitos:</b> Lendário Studio © 2026</p>
            <center><button class="btn" onclick="closeInfo()">VOLTAR</button></center>
        </div>

        <div id="char-selection" class="menu-box" style="display: none;">
            <h2>ESCOLHA SUA SKIN</h2>
            <div style="display: flex; gap: 20px; justify-content: center; margin-bottom: 20px;">
                <div onclick="selectChar(&#39;boy&#39;)" style="cursor:pointer; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px;">
                    <canvas id="preview-boy" width="50" height="65"></canvas>
                    <p>MENINO</p>
                </div>
                <div onclick="selectChar(&#39;girl&#39;)" style="cursor:pointer; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px;">
                    <canvas id="preview-girl" width="50" height="65"></canvas>
                    <p>MENINA</p>
                </div>
            </div>
            <button class="btn" id="start-btn" style="display: block; background: rgb(46, 204, 113);" onclick="finalizeGameStart()">INICIAR!</button>
        </div>

        <div id="death" class="menu-box" style="display: none;">
            <h2>VOCÊ CAIU!</h2>
            <button class="btn" onclick="continueGame()">CONTINUAR</button>
            <button class="btn" style="background:#7f8c8d;" onclick="resetToMenu()">SAIR</button>
        </div>
    </div>

    <div id="hud" style="display: none;">
        <div id="joystick-area"><div id="joystick-stick" style="left: 35px;"></div></div>
        <div id="jump-button">PULAR</div>
    </div>

    <div id="stats">
        <div id="hearts"><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i><i class="fa-solid fa-heart real-heart"></i></div>
        <div id="star-counter">
            <!-- Ícone real de estrela -->
            <i class="fa-solid fa-star real-star"></i> 
            <span id="star-count-text">4</span>
        </div>
    </div>
    <canvas id="game" width="1508" height="677"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const music = document.getElementById("game-music");
    let musicStarted = false;

    function startMusic() { if (!musicStarted) { music.play(); musicStarted = true; } }
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    let gameState = 'menu';
    let lives = 10;
    let starsCollected = 0;
    let selectedHero = 'boy';
    let lastX = 0, lastY = 0;
    let platforms = [], stars = [], keys = {};
    let player = { x: 100, y: 0, w: 45, h: 60, vx: 0, vy: 0, speed: 7, jump: 18, onGround: false };
    let camera = { x: 0 };
    let joystick = { x: 0, active: false };

    // CONTROLES PC
    window.addEventListener("keydown", (e) => { keys[e.code] = true; });
    window.addEventListener("keyup", (e) => { keys[e.code] = false; });

    // CONTROLES CELULAR
    const jumpBtn = document.getElementById("jump-button");
    jumpBtn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if(player.onGround && gameState === 'playing') { player.vy = -player.jump; player.onGround = false; }
    });

    const joyArea = document.getElementById("joystick-area");
    const joyStick = document.getElementById("joystick-stick");
    joyArea.addEventListener("pointerdown", (e) => { joystick.active = true; updateJoy(e); });
    window.addEventListener("pointermove", (e) => { if(joystick.active) updateJoy(e); });
    window.addEventListener("pointerup", () => { joystick.active = false; joystick.x = 0; joyStick.style.left = "35px"; });

    function updateJoy(e) {
        let rect = joyArea.getBoundingClientRect();
        let dx = e.clientX - (rect.left + rect.width/2);
        let normX = Math.max(-1, Math.min(1, dx / 50));
        joystick.x = normX;
        joyStick.style.left = (35 + normX * 30) + "px";
    }

    // UI
    function showInfo() { document.getElementById("main-menu").style.display = "none"; document.getElementById("info-menu").style.display = "block"; }
    function closeInfo() { document.getElementById("info-menu").style.display = "none"; document.getElementById("main-menu").style.display = "flex"; }
    function openCharSelect() { 
        document.getElementById("main-menu").style.display = "none"; 
        document.getElementById("char-selection").style.display = "flex"; 
        drawPixelChar(document.getElementById("preview-boy").getContext("2d"), 'boy', 2, 2); 
        drawPixelChar(document.getElementById("preview-girl").getContext("2d"), 'girl', 2, 2); 
    }
    function selectChar(type) { selectedHero = type; document.getElementById("start-btn").style.display = "block"; }
    function finalizeGameStart() { 
        document.getElementById("char-selection").style.display = "none"; 
        document.getElementById("hud").style.display = "block"; 
        starsCollected = 0;
        updateUI();
        resetMap(); 
        lives = 10; 
        updateHearts(); 
        gameState = 'playing'; 
    }
    function resetToMenu() { gameState = 'menu'; document.getElementById("death").style.display = "none"; document.getElementById("hud").style.display = "none"; document.getElementById("main-menu").style.display = "flex"; }
    function continueGame() { document.getElementById("death").style.display = "none"; player.y = -100; player.vx = 0; player.vy = 0; gameState = 'playing'; }
    
    // Atualização dos corações reais (Gerando HTML dinamicamente)
    function updateHearts() { 
        let heartsHTML = "";
        for(let i=0; i<lives; i++) {
            heartsHTML += '<i class="fa-solid fa-heart real-heart"></i>';
        }
        document.getElementById("hearts").innerHTML = heartsHTML; 
    }
    
    function updateUI() { document.getElementById("star-count-text").innerText = starsCollected; }

    function drawPixelChar(c, type, x, y) {
        c.save(); c.translate(x, y);
        if(type === 'boy') {
            c.fillStyle = "#5d4037"; c.fillRect(10, 0, 30, 15);
            c.fillStyle = "#ffdbac"; c.fillRect(10, 15, 30, 20);
            c.fillStyle = "#000"; c.fillRect(15, 22, 5, 5); c.fillRect(30, 22, 5, 5);
            c.fillStyle = "#1976d2"; c.fillRect(10, 35, 30, 20);
            c.fillStyle = "#fff"; c.fillRect(20, 40, 10, 5);
            c.fillStyle = "#263238"; c.fillRect(10, 55, 30, 10);
        } else {
            c.fillStyle = "#fbc02d"; c.fillRect(5, 5, 40, 45);
            c.fillStyle = "#d81b60"; c.fillRect(10, 2, 30, 5);
            c.fillStyle = "#ffdbac"; c.fillRect(10, 10, 30, 20);
            c.fillStyle = "#000"; c.fillRect(15, 18, 5, 5); c.fillRect(30, 18, 5, 5);
            c.fillStyle = "#fff"; c.fillRect(17, 18, 2, 2); c.fillRect(32, 18, 2, 2);
            c.fillStyle = "#f06292"; c.fillRect(10, 30, 30, 25);
            c.fillStyle = "#f8bbd0"; c.fillRect(10, 50, 30, 5);
            c.fillStyle = "#880e4f"; c.fillRect(10, 55, 30, 10);
        }
        c.restore();
    }

    function drawMapTexture(c, p) {
        c.fillStyle = "#8d6e3e"; c.fillRect(p.x, p.y, p.w, p.h);
        c.fillStyle = "#46c33d"; c.fillRect(p.x, p.y, p.w, 25);
        for(let i = 0; i <= p.w; i += 25) { c.beginPath(); c.arc(p.x + i, p.y + 25, 15, 0, Math.PI); c.fill(); }
    }

    // Desenho da Estrela Real no Canvas (Vetorizado)
    function drawStar(c, s) {
        if(s.collected) return;
        
        c.save();
        
        let time = Date.now() * 0.005;
        let bounce = Math.sin(time) * 10;
        let starY = s.y + bounce;

        // Estilo da estrela real
        c.fillStyle = "#f1c40f"; // Dourado principal
        c.strokeStyle = "#fff"; // Borda branca para destacar
        c.lineWidth = 2;
        
        // Efeito de brilho real no canvas
        c.shadowColor = "rgba(241, 196, 15, 0.8)";
        c.shadowBlur = 15;

        // Desenhar a forma da estrela
        c.beginPath();
        let points = 5;
        let outerRadius = 15;
        let innerRadius = 7;
        let angle = Math.PI / points;

        for(let i=0; i < 2 * points; i++) {
            let r = (i % 2 === 0) ? outerRadius : innerRadius;
            let currAngle = i * angle - Math.PI/2; // Rotacionar para ponta ficar para cima
            c.lineTo(s.x + Math.cos(currAngle)*r, starY + Math.sin(currAngle)*r);
        }
        
        c.closePath(); 
        c.fill();
        c.stroke();
        
        c.restore(); // Restaura contexto para não afetar outros desenhos
    }

    function resetMap() { 
        platforms = []; 
        stars = [];
        lastY = canvas.height - 200; 
        platforms.push({ x: 0, y: lastY, w: 800, h: 600 }); 
        lastX = 850; 
        player.x = 100; 
        player.y = lastY - 100; 
    }

    function update() {
        if(gameState === 'menu') { player.vx = 2.5; }
        else if(gameState === 'playing') {
            if(keys["ArrowRight"] || keys["KeyD"]) player.vx = player.speed;
            else if(keys["ArrowLeft"] || keys["KeyA"]) player.vx = -player.speed;
            else if(joystick.active) player.vx = player.speed * joystick.x;
            else player.vx *= 0.8;

            if((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.onGround) {
                player.vy = -player.jump;
                player.onGround = false;
            }

            // Coleta de estrelas
            stars.forEach(s => {
                if(!s.collected) {
                    let dx = (player.x + player.w/2) - s.x;
                    let dy = (player.y + player.h/2) - s.y;
                    // Distância de colisão ligeiramente maior para o ícone real
                    if(Math.sqrt(dx*dx + dy*dy) < 45) {
                        s.collected = true;
                        starsCollected++;
                        updateUI();
                    }
                }
            });
        }
        player.vy += 0.8; player.x += player.vx; player.y += player.vy;
        player.onGround = false;
        platforms.forEach(p => { if(player.x + player.w > p.x && player.x < p.x + p.w) { if(player.y + player.h > p.y && player.y + player.h < p.y + player.vy + 10 && player.vy >= 0) { player.y = p.y - player.h; player.vy = 0; player.onGround = true; } } });
        camera.x += ((player.x - canvas.width/3) - camera.x) * 0.1;
        
        if(lastX < player.x + canvas.width) { 
            let gap = 170 + Math.random() * 80; 
            let pW = 250 + Math.random() * 100; 
            lastY = Math.max(canvas.height*0.4, Math.min(canvas.height-150, lastY + (Math.random()-0.5)*120)); 
            platforms.push({ x: lastX + gap, y: lastY, w: pW, h: 600 }); 
            
            // Adiciona estrela na nova plataforma
            if(Math.random() > 0.3) {
                stars.push({ x: lastX + gap + pW/2, y: lastY - 60, collected: false });
            }
            
            lastX += gap + pW; 
        }
        if(player.y > canvas.height + 200) { if(gameState === 'playing') { gameState = 'paused'; lives--; updateHearts(); if(lives <= 0) resetToMenu(); else document.getElementById("death").style.display = "flex"; } else { player.y = -100; player.x += 100; } }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d4efb5"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(-camera.x, 0);
        platforms.forEach(p => drawMapTexture(ctx, p));
        stars.forEach(s => drawStar(ctx, s));
        drawPixelChar(ctx, selectedHero, player.x, player.y);
        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    resetMap();
    loop();
</script>

</body></html>
